# Chapter 3 configuration: Tail Risk and Alternative Risk Objectives

tail_risk:
  objective: "minimum_historical_cvar"
  lookback_window_days: 252
  rebalance_frequency: "monthly"
  beta: 0.95
  beta_sensitivity:
    enabled: false
    values: [0.975]

comparators:
  include:
    - minvar_baseline_ch1
    - minvar_no_crypto_control
    - cvar_baseline
    - cvar_no_crypto_control

constraints:
  long_only: true
  weights_sum_to_one: true
  max_weight_per_asset: 0.35
  max_total_crypto_weight: 0.20

costs:
  enabled: true
  cost_bps: 10.0

stress_windows:
  - window_id: "covid_crash"
    label: "COVID crash"
    start_date: "2020-02-20"
    end_date: "2020-04-30"
  - window_id: "rates_stock_bond_stress_2022"
    label: "2022 rates / stock-bond stress"
    start_date: "2022-01-03"
    end_date: "2022-10-31"
  - window_id: "crypto_stress_2022"
    label: "2022 crypto stress"
    start_date: "2022-04-01"
    end_date: "2022-12-31"
