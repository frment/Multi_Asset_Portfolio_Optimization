# Chapter 4 — Regime Analysis configuration

# ── Input / output paths ──────────────────────────────────────────────────────
paths:
  returns_simple: "data/processed/returns_simple.csv"
  output_dir: "data/processed/regime_analysis"
  regime_features: "data/processed/regime_analysis/regime_features.csv"

# ── Feature construction parameters ─────────────────────────────────────────
features:

  # ---- Realized volatility (annualised, std of log-returns) ----------------
  realized_volatility:
    window: 63          # ~3 months of trading days
    min_periods: 21     # require at least 1 month of data before emitting a value
    annualization_factor: 252
    tickers:
      - "SPY"
      - "BTC-USD"

  # ---- Drawdown (max loss from rolling peak) --------------------------------
  drawdown:
    window: 126         # ~6 months of trading days
    min_periods: 63     # require at least 3 months
    tickers:
      - "SPY"
      - "BTC-USD"

  # ---- Rolling pairwise correlations (Pearson on simple returns) -----------
  correlation:
    window: 126
    min_periods: 63
    pairs:
      - ["SPY", "TLT"]
      - ["SPY", "BTC-USD"]
      - ["BTC-USD", "ETH-USD"]

  # ---- Momentum (cumulative simple return over window) ---------------------
  momentum:
    window: 126
    min_periods: 63
    tickers:
      - "SPY"
      - "BTC-USD"
      - "TLT"

# ── NaN handling ─────────────────────────────────────────────────────────────
# After rolling windows the first (max_min_periods - 1) rows will have NaNs.
# The feature builder drops those rows to guarantee a clean output.
nan_handling:
  strategy: "dropna"   # only valid option for Phase 1

# ── Regime detection parameters (Phase 2) ────────────────────────────────────
detection:

  # ---- Reproducibility -------------------------------------------------------
  random_state: 42

  # ---- Primary model ---------------------------------------------------------
  # "hmm"    : Gaussian HMM (requires hmmlearn; falls back to kmeans if unavailable)
  # "kmeans" : KMeans clustering
  primary_model: "hmm"

  # ---- Default number of regimes ---------------------------------------------
  # 2 = Low-stress/Risk-on vs High-stress/Risk-off
  # 3 adds a Mixed/Transition state — evaluated but not the default
  n_states_default: 2

  # ---- Candidate model grid (all four are fit and reported) ------------------
  candidate_models:
    - model: "kmeans"
      n_states: 2
    - model: "kmeans"
      n_states: 3
    - model: "hmm"
      n_states: 2
    - model: "hmm"
      n_states: 3

  # ---- HMM settings ----------------------------------------------------------
  hmm:
    covariance_type: "full"   # full covariance matrix per state
    n_iter: 200               # max EM iterations
    tol: 1.0e-4               # convergence tolerance

  # ---- Stress-score feature weights (used for deterministic label ordering) --
  # Sign convention: higher value = more stressed.
  # For volatilities and drawdown magnitude: raw value directly.
  # For drawdown (which is ≤ 0): we use the absolute value (negated).
  # For corr_spy_btc: higher correlation = more risk-on, so we negate for stress.
  # For corr_spy_tlt: negative correlation is the "flight-to-safety" regime; higher
  #   (less negative) means less stressed, so we negate for stress.
  stress_score_features:
    realized_vol_spy_63d:       1.0
    realized_vol_btc_usd_63d:   1.0
    drawdown_spy_126d:         -1.0   # drawdown ≤ 0; negate so higher = more stress
    drawdown_btc_usd_126d:     -1.0
    corr_spy_btc_usd_126d:     -1.0   # high SPY-BTC correlation = risk-on; negate for stress
    corr_spy_tlt_126d:          1.0   # SPY-TLT correlation rising toward 0/+ = more stress

  # ---- Human-readable state names -------------------------------------------
  state_names:
    2:
      0: "Low-stress / Risk-on"
      1: "High-stress / Risk-off"
    3:
      0: "Low-stress / Risk-on"
      1: "High-stress / Risk-off"
      2: "Mixed / Transition"

  # ---- Output paths ----------------------------------------------------------
  outputs:
    regime_labels:            "data/processed/regime_analysis/regime_labels.csv"
    regime_model_summary:     "data/processed/regime_analysis/regime_model_summary.csv"
    regime_transition_matrix: "data/processed/regime_analysis/regime_transition_matrix.csv"

# ── Regime evaluation parameters (Phase 3) ────────────────────────────────────
evaluation:

  # ---- Cost settings (must match tail_risk.yaml cost_bps) -------------------
  cost_bps: 10.0            # applied to reconstruct net daily returns

  # ---- Minimum observations before a warning is raised ---------------------
  min_obs_warning_threshold: 63

  # ---- Expected Shortfall confidence level ----------------------------------
  es_beta: 0.95

  # ---- Crypto weight tolerance (below = economically zero) -----------------
  crypto_weight_tolerance: 1.0e-6

  # ---- Strategies to evaluate ----------------------------------------------
  strategies:
    - "minvar_baseline_ch1"
    - "minvar_no_crypto_control"
    - "cvar_baseline"
    - "cvar_no_crypto_control"

  # ---- Crypto tickers -------------------------------------------------------
  crypto_tickers:
    - "BTC-USD"
    - "ETH-USD"

  # ---- Input paths ----------------------------------------------------------
  inputs:
    tail_risk_returns:       "data/processed/tail_risk/tail_risk_returns.csv"
    tail_risk_weights_panel: "data/processed/tail_risk/tail_risk_weights_panel.csv"
    tail_risk_turnover_panel: "data/processed/tail_risk/tail_risk_turnover_panel.csv"
    stress_summary:          "data/processed/tail_risk/stress_summary.csv"
    regime_labels:           "data/processed/regime_analysis/regime_labels.csv"

  # ---- Output paths ---------------------------------------------------------
  outputs:
    regime_conditional_performance:     "data/processed/regime_analysis/regime_conditional_performance.csv"
    regime_conditional_performance_net: "data/processed/regime_analysis/regime_conditional_performance_net.csv"
    regime_crypto_exposure:             "data/processed/regime_analysis/regime_crypto_exposure.csv"
    regime_drawdown_tail_summary:       "data/processed/regime_analysis/regime_drawdown_tail_summary.csv"
    regime_stress_window_map:           "data/processed/regime_analysis/regime_stress_window_map.csv"

  # ---- Stress windows (must match tail_risk.yaml stress_windows) ------------
  stress_windows:
    - window_id: "covid_crash"
      label: "COVID crash"
      start_date: "2020-02-20"
      end_date:   "2020-04-30"
    - window_id: "rates_stock_bond_stress_2022"
      label: "2022 rates / stock-bond stress"
      start_date: "2022-01-03"
      end_date:   "2022-10-31"
    - window_id: "crypto_stress_2022"
      label: "2022 crypto stress"
      start_date: "2022-04-01"
      end_date:   "2022-12-31"
